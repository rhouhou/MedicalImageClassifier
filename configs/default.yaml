seed: 42

paths:
  data_dir: data/chest_xray
  outputs_dir: outputs
  ckpt_dir: outputs/checkpoints
  figures_dir: outputs/figures
  logs_dir: outputs/logs

training:
  batch_size: 4
  num_workers: 0
  epochs: 1
  lr: 0.0003
  weight_decay: 0.0001
  warmup_epochs: 0
  mixed_precision: false
  early_stopping_patience: 1
  class_weighted_loss: true
  use_focal_loss: false
  scheduler: cosine

model:
  arch: resnet18
  pretrained: true
  num_classes: 2

augment:
  image_size: 224
  hflip: 0.5
  rotation: 7
  brightness: 0.1
  contrast: 0.1

loss:
  name: weighted_cross_entropy

metrics:
  - accuracy
  - roc_auc
  - pr_auc
  - brier_score