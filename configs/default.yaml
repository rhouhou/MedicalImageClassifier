seed: 42

paths:
  data_dir: data/chest_xray
  outputs_dir: outputs
  ckpt_dir: outputs/checkpoints
  figures_dir: outputs/figures
  logs_dir: outputs/logs

data:
  root: data/chest_xray
  image_size: 224
  batch_size: 32
  num_workers: 4

training:
  batch_size: 32
  num_workers: 4
  epochs: 20
  lr: 0.0003
  weight_decay: 0.0001
  warmup_epochs: 1
  mixed_precision: true
  early_stopping_patience: 4
  class_weighted_loss: true
  use_focal_loss: false
  scheduler: cosine

model:
  backbone: resnet50
  pretrained: true
  num_classes: 2

augment:
  image_size: 224
  hflip: 0.5
  rotation: 7
  brightness: 0.1
  contrast: 0.1

loss:
  name: weighted_cross_entropy

metrics:
  - accuracy
  - roc_auc
  - pr_auc
  - brier_score